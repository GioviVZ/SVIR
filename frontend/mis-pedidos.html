<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dulce Momento | Mis pedidos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    .pedido-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px 20px;
      margin-bottom: 16px;
      box-shadow: 0 1px 6px rgba(0,0,0,.06);
      border-left: 4px solid #e5e7eb;
    }
    .pedido-card.estado-entregado  { border-left-color: #16a34a; }
    .pedido-card.estado-cancelado  { border-left-color: #dc2626; opacity: .8; }
    .pedido-card.estado-en_camino  { border-left-color: #1d4ed8; }
    .pedido-card.estado-listo      { border-left-color: #f97316; }

    .pedido-id { font-weight: 700; font-size: 1rem; }
    .pedido-fecha { font-size: .8rem; color: #94a3b8; }

    .badge-pedido {
      font-size: .7rem; font-weight: 700; padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .badge-cancelado   { background: #fee2e2; color: #b91c1c; }
    .badge-entregado   { background: #dcfce7; color: #15803d; }
    .badge-en-progreso { background: #fff7ed; color: #c2410c; }

    /* Timeline */
    .pedido-timeline {
      display: flex;
      margin: 18px 0 6px;
    }
    .timeline-step {
      flex: 1;
      text-align: center;
      position: relative;
      font-size: .72rem;
      color: #94a3b8;
    }
    .timeline-step .ts-circle {
      width: 30px; height: 30px; border-radius: 50%;
      background: #e2e8f0; color: #94a3b8;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 6px; font-size: .9rem;
      position: relative; z-index: 2;
      transition: all .2s;
    }
    .timeline-step .ts-line {
      position: absolute; top: 15px; left: -50%; width: 100%; height: 3px;
      background: #e2e8f0; z-index: 1;
    }
    .timeline-step:first-child .ts-line { display: none; }
    .timeline-step.completed .ts-circle { background: #f97316; color: #fff; }
    .timeline-step.completed .ts-line   { background: #f97316; }
    .timeline-step.active .ts-circle {
      background: #f97316; color: #fff;
      box-shadow: 0 0 0 4px rgba(249,115,22,.2);
    }
    .timeline-step.active { color: #c2410c; font-weight: 700; }
    .timeline-step.completed { color: #475569; }

    /* Items list */
    .pedido-items {
      list-style: none; padding: 0; margin: 12px 0 0;
      font-size: .82rem; color: #475569;
      background: #f8fafc; border-radius: 8px; padding: 8px 12px;
    }
    .pedido-items li { line-height: 1.6; display: flex; justify-content: space-between; }

    .pedido-dir { font-size: .82rem; color: #475569; margin-top: 8px; }
    .maps-link-pedido { color: #6d28d9; font-size: .82rem; font-weight: 600; text-decoration: none; }
    .maps-link-pedido:hover { text-decoration: underline; }

    .pedido-total { font-size: .95rem; font-weight: 700; color: #f97316; }

    .buscar-pedido-box {
      background: #fff7ed; border-radius: 16px; padding: 18px 20px; margin-bottom: 24px;
    }

    .empty-pedidos { text-align: center; color: #94a3b8; padding: 50px 20px; }
  </style>
</head>
<body class="store-body">

  <!-- ── NAVBAR ──────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg sticky-top store-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold brand-store d-flex align-items-center gap-2" href="home.html">
        <img src="assets/img/logo.png" alt="Dulce Momento" class="navbar-logo-img">
        <span>Dulce Momento</span>
      </a>

      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="catalogo.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Seguir comprando
        </a>

        <a href="carrito.html" class="btn btn-outline-secondary btn-sm position-relative" title="Mi carrito">
          <i class="bi bi-cart3 fs-6"></i>
          <span class="cart-count-badge d-none" id="cartCounter">0</span>
        </a>

        <div id="clienteNav" class="d-none d-flex align-items-center gap-2">
          <span class="text-muted small d-none d-md-inline">
            <i class="bi bi-person-circle me-1"></i><strong id="clienteNombreNav"></strong>
          </span>
          <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesionCliente()">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
          </button>
        </div>

        <div id="authNav">
          <a href="home.html?auth=login" class="btn btn-outline-brand btn-sm">Ingresar</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── CONTENIDO ──────────────────────────────────────────────── -->
  <section class="py-5">
    <div class="container">
      <div class="text-center mb-5">
        <span class="store-pill">Tu cuenta</span>
        <h1 class="fw-bold mt-3">Mis pedidos</h1>
        <p class="text-muted">Sigue el estado de tus pedidos en tiempo real.</p>
      </div>

      <div class="row justify-content-center">
        <div class="col-lg-8">

          <!-- Buscar pedido por número (invitados) -->
          <div id="buscarPedidoBox" class="buscar-pedido-box d-none">
            <label class="form-label fw-semibold small mb-2">¿Tienes el número de tu pedido?</label>
            <div class="d-flex gap-2">
              <input type="number" id="inputBuscarPedido" class="form-control" placeholder="Ej: 125" min="1">
              <button class="btn btn-brand" onclick="buscarPedidoPorId()">
                <i class="bi bi-search me-1"></i>Buscar
              </button>
            </div>
            <div id="buscarPedidoMsg" class="small mt-2"></div>
          </div>

          <div id="listaPedidos">
            <div class="text-center py-5">
              <div class="spinner-border text-warning" role="status"></div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </section>

  <!-- ── FOOTER ─────────────────────────────────────────────────── -->
  <footer class="store-footer">
    <div class="container text-center">
      <span class="text-muted small">© 2026 Dulce Momento ·
        <a href="login.html" class="text-muted text-decoration-none">Acceso personal</a>
      </span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/tienda.js"></script>
  <script src="assets/js/mis-pedidos.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      actualizarNavCliente();
      actualizarContadorCarrito();
      iniciarMisPedidos();
    });
  </script>
</body>
</html>
