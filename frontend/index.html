<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVIR | Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="login-page">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card login-card shadow-lg border-0">
      <div class="card-body p-4 p-md-5">
        <div class="text-center mb-4">
          <div class="logo-circle mx-auto mb-3">D</div>
          <h2 class="fw-bold mb-1">Dulce Momento</h2>
          <p class="text-muted mb-0">Sistema de Ventas e Inventario de Repostería</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Usuario</label>
            <input type="text" id="username" class="form-control form-control-lg" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" id="password" class="form-control form-control-lg" required>
          </div>

          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-brand btn-lg">Ingresar</button>
          </div>

          <div id="errorMessage" class="alert alert-danger mt-3 d-none" role="alert"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="assets/js/auth.js"></script>
  <script>
    const form = document.getElementById("loginForm");
    const errorBox = document.getElementById("errorMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.classList.add("d-none");
      errorBox.textContent = "";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        await login(username, password);
      } catch (error) {
        errorBox.textContent = error.message || "No se pudo iniciar sesión";
        errorBox.classList.remove("d-none");
      }
    });
  </script>
</body>
</html>
