<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dulce Momento | Mi carrito</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="store-body">

  <!-- ── NAVBAR ──────────────────────────────────────────────────── -->
  <nav class="navbar navbar-expand-lg sticky-top store-navbar">
    <div class="container">
      <a class="navbar-brand fw-bold brand-store d-flex align-items-center gap-2" href="home.html">
        <img src="assets/img/logo.png" alt="Dulce Momento" class="navbar-logo-img">
        <span>Dulce Momento</span>
      </a>

      <div class="d-flex align-items-center gap-2 ms-auto">
        <a href="catalogo.html" class="btn btn-outline-secondary btn-sm">
          <i class="bi bi-arrow-left me-1"></i>Seguir comprando
        </a>

        <div id="clienteNav" class="d-none d-flex align-items-center gap-2">
          <span class="text-muted small d-none d-md-inline">
            <i class="bi bi-person-circle me-1"></i><strong id="clienteNombreNav"></strong>
          </span>
          <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesionCliente()">
            <i class="bi bi-box-arrow-right me-1"></i>Salir
          </button>
        </div>

        <div id="authNav">
          <a href="home.html?auth=login" class="btn btn-outline-brand btn-sm">Ingresar</a>
        </div>
      </div>
    </div>
  </nav>

  <!-- ── CONTENIDO ──────────────────────────────────────────────── -->
  <section class="py-5">
    <div class="container">
      <div class="text-center mb-5">
        <span class="store-pill">Tu pedido</span>
        <h1 class="fw-bold mt-3">Carrito de compras</h1>
        <p class="text-muted">Revisa tus productos antes de confirmar.</p>
      </div>

      <div class="row g-4">
        <!-- Lista de productos -->
        <div class="col-lg-8">
          <div class="card page-card">
            <div class="card-body p-4">
              <div id="carritoLista">
                <p class="text-muted">Cargando...</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Resumen y checkout -->
        <div class="col-lg-4">
          <div class="card page-card sticky-cart">
            <div class="card-body p-4">
              <h5 class="fw-bold mb-4">Resumen del pedido</h5>

              <div class="d-flex justify-content-between mb-3">
                <span class="text-muted">Total</span>
                <strong id="carritoTotal" class="store-price">S/ 0.00</strong>
              </div>

              <hr class="my-3">

              <!-- Info del cliente (si está logueado) -->
              <div id="clienteInfoCarrito" class="mb-3 d-none">
                <div class="d-flex align-items-center gap-2 p-3 rounded-3" style="background:#fff7ed;">
                  <i class="bi bi-person-check-fill text-warning"></i>
                  <div>
                    <div class="fw-semibold small" id="clienteNombreCarrito"></div>
                    <div class="text-muted" style="font-size:0.78rem;" id="clienteDniCarrito"></div>
                  </div>
                </div>
              </div>

              <!-- Sin sesión -->
              <div id="sinSesionCarrito" class="mb-3">
                <div class="alert alert-warning py-2 px-3 mb-0" style="border-radius:12px; font-size:0.85rem;">
                  <i class="bi bi-info-circle me-1"></i>
                  <a href="home.html?auth=login" class="fw-semibold text-warning-emphasis text-decoration-none">
                    Inicia sesión
                  </a> para confirmar tu pedido.
                </div>
              </div>

              <div class="d-grid gap-2">
                <button id="btnConfirmar" class="btn btn-brand btn-lg" onclick="abrirModalEntrega()">
                  <i class="bi bi-bag-check me-2"></i>Confirmar pedido
                </button>
                <button class="btn btn-light" onclick="vaciarCarrito()">Vaciar carrito</button>
              </div>

              <div id="mensajeCarrito" class="mt-3 small"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- ── MODAL TIPO DE ENTREGA ─────────────────────────────────── -->
  <div class="modal fade" id="entregaModal" tabindex="-1" aria-labelledby="entregaModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="border-radius:20px; overflow:hidden;">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="entregaModalLabel">¿Cómo deseas recibir tu pedido?</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body px-4 pb-4">

          <!-- Selector recojo / delivery -->
          <div class="d-flex gap-3 mb-4">
            <button id="btnOpcionRecojo" class="entrega-opcion active flex-fill" onclick="seleccionarEntrega('recojo')">
              <i class="bi bi-shop-window d-block mb-2" style="font-size:1.6rem;"></i>
              <span class="fw-semibold">Recojo en tienda</span>
            </button>
            <button id="btnOpcionDelivery" class="entrega-opcion flex-fill" onclick="seleccionarEntrega('delivery')">
              <i class="bi bi-scooter d-block mb-2" style="font-size:1.6rem;"></i>
              <span class="fw-semibold">Delivery</span>
            </button>
          </div>

          <!-- Formulario delivery (oculto por defecto) -->
          <div id="camposDelivery" class="d-none">
            <div class="mb-3">
              <label class="form-label fw-semibold small">Dirección de entrega <span class="text-danger">*</span></label>
              <input id="deliveryDireccion" type="text" class="form-control" placeholder="Ej: Av. Lima 123, Miraflores">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Teléfono de contacto <span class="text-danger">*</span></label>
              <input id="deliveryTelefono" type="tel" class="form-control" placeholder="Ej: 999 888 777">
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold small">Referencia <span class="text-muted fw-normal">(opcional)</span></label>
              <input id="deliveryReferencia" type="text" class="form-control" placeholder="Ej: Frente al parque, piso 2">
            </div>
            <!-- Ubicación GPS -->
            <div class="mb-2">
              <button type="button" class="btn btn-outline-secondary btn-sm w-100" onclick="capturarUbicacion()">
                <i class="bi bi-geo-alt me-1"></i>Marcar mi ubicación actual
              </button>
            </div>
            <div id="gpsEstado" class="small text-muted mb-1 d-none"></div>
            <input type="hidden" id="deliveryLat">
            <input type="hidden" id="deliveryLng">
          </div>

          <!-- Mensaje de error del modal -->
          <div id="entregaMensaje" class="small mb-3"></div>

          <div class="d-grid">
            <button id="btnConfirmarEntrega" class="btn btn-brand btn-lg" onclick="procesarPedidoConEntrega()">
              <i class="bi bi-bag-check me-2"></i>Confirmar pedido
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── FOOTER ─────────────────────────────────────────────────── -->
  <footer class="store-footer">
    <div class="container text-center">
      <span class="text-muted small">© 2026 Dulce Momento ·
        <a href="login.html" class="text-muted text-decoration-none">Acceso personal</a>
      </span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/tienda.js"></script>
  <script src="assets/js/carrito.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      renderCarrito();
      actualizarNavCliente();
      actualizarContadorCarrito();

      // Mostrar info del cliente en panel de checkout
      const cliente = obtenerClienteWeb();
      if (cliente) {
        document.getElementById("clienteInfoCarrito").classList.remove("d-none");
        document.getElementById("sinSesionCarrito").classList.add("d-none");
        document.getElementById("clienteNombreCarrito").textContent = cliente.nombre;
        const subtitulo = cliente.esInvitado
          ? "Invitado"
          : (cliente.dni ? `DNI: ${cliente.dni}` : "");
        document.getElementById("clienteDniCarrito").textContent = subtitulo;
      }
    });
  </script>
</body>
</html>
