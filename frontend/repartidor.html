<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SVIR | Repartidor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body { background: #f8fafc; }

    .rep-header {
      background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
      color: #fff;
      padding: 18px 20px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .rep-header h1 { font-size: 1.15rem; font-weight: 700; margin: 0; }
    .rep-header small { opacity: .85; font-size: .8rem; }

    .rep-section-title {
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
      padding: 14px 16px 6px;
    }

    .delivery-card {
      background: #fff;
      border-radius: 16px;
      margin: 0 12px 10px;
      padding: 14px 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
      border-left: 4px solid #e5e7eb;
    }
    .delivery-card.estado-listo     { border-left-color: #f97316; }
    .delivery-card.estado-en_camino { border-left-color: #1d4ed8; }
    .delivery-card.estado-entregado { border-left-color: #16a34a; opacity: .7; }

    .delivery-card .cliente-nombre { font-weight: 700; font-size: .95rem; }
    .delivery-card .delivery-dir   { font-size: .82rem; color: #475569; margin-top: 2px; }
    .delivery-card .delivery-meta  { font-size: .78rem; color: #94a3b8; margin-top: 4px; }

    .badge-estado-listo     { background: #fff7ed; color: #c2410c; font-size: .7rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .badge-estado-en_camino { background: #dbeafe; color: #1d4ed8; font-size: .7rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
    .badge-estado-entregado { background: #dcfce7; color: #15803d; font-size: .7rem; padding: 3px 8px; border-radius: 20px; font-weight: 600; }

    .btn-rep-primary   { background: #f97316; color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: .82rem; font-weight: 600; }
    .btn-rep-primary:hover { background: #ea580c; color: #fff; }
    .btn-rep-success   { background: #16a34a; color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: .82rem; font-weight: 600; }
    .btn-rep-success:hover { background: #15803d; color: #fff; }
    .btn-rep-outline   { background: transparent; color: #475569; border: 1.5px solid #e2e8f0; border-radius: 10px; padding: 8px 14px; font-size: .82rem; }

    .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; font-size: .9rem; }

    .total-badge { font-size: .8rem; font-weight: 700; color: #f97316; }

    .tel-link { color: #1d4ed8; font-weight: 600; text-decoration: none; }
    .tel-link:hover { text-decoration: underline; }

    .maps-link { color: #6d28d9; font-size: .82rem; font-weight: 600; text-decoration: none; }
    .maps-link:hover { text-decoration: underline; }

    .wa-link { color: #15803d; font-size: .82rem; font-weight: 600; text-decoration: none; }
    .wa-link:hover { text-decoration: underline; }

    .copy-btn {
      background: transparent; border: none; color: #94a3b8; padding: 0 4px; line-height: 1; font-size: .85rem;
    }
    .copy-btn:hover { color: #475569; }

    .items-list {
      list-style: none; padding: 0; margin: 6px 0 0;
      font-size: .8rem; color: #475569;
      background: #f8fafc; border-radius: 8px; padding: 6px 10px;
    }
    .items-list li { line-height: 1.5; }

    .rep-summary {
      display: flex; gap: 8px; padding: 10px 12px 0; flex-wrap: wrap;
    }
    .summary-chip {
      flex: 1; min-width: 80px; background: #fff; border-radius: 12px; padding: 8px 10px;
      text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .summary-chip .chip-value { font-size: 1.1rem; font-weight: 700; color: #1e293b; }
    .summary-chip .chip-label { font-size: .68rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }

    .section-count {
      display: inline-block; background: #e2e8f0; color: #475569; font-size: .68rem;
      font-weight: 700; border-radius: 20px; padding: 1px 7px; margin-left: 6px;
    }

    #spinnerCarga { display: flex; justify-content: center; padding: 40px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="rep-header d-flex justify-content-between align-items-center">
    <div>
      <h1><i class="bi bi-scooter me-2"></i>Mis entregas</h1>
      <small id="repNombre">Cargando...</small>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-sm btn-outline-light" onclick="cargarPedidos()" title="Actualizar">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button class="btn btn-sm btn-outline-light" onclick="logout()">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- Cuerpo -->
  <div id="spinnerCarga">
    <div class="spinner-border text-warning" role="status"></div>
  </div>

  <div id="contenidoRep" class="d-none pb-5">

    <!-- Resumen del día -->
    <div class="rep-summary">
      <div class="summary-chip">
        <div class="chip-value" id="contadorListo">0</div>
        <div class="chip-label">Por recoger</div>
      </div>
      <div class="summary-chip">
        <div class="chip-value" id="contadorEnCamino">0</div>
        <div class="chip-label">En camino</div>
      </div>
      <div class="summary-chip">
        <div class="chip-value" id="contadorEntregados">0</div>
        <div class="chip-label">Entregados</div>
      </div>
      <div class="summary-chip">
        <div class="chip-value" id="totalEntregadoHoy">S/ 0.00</div>
        <div class="chip-label">Cobrado hoy</div>
      </div>
    </div>

    <!-- Para recoger -->
    <div id="seccionListo">
      <div class="rep-section-title"><i class="bi bi-bag-check me-1"></i>Para recoger en tienda<span class="section-count" id="badgeListo"></span></div>
      <div id="listaPendientes"></div>
    </div>

    <!-- En camino -->
    <div id="seccionEnCamino">
      <div class="rep-section-title"><i class="bi bi-scooter me-1"></i>En camino<span class="section-count" id="badgeEnCamino"></span></div>
      <div id="listaEnCamino"></div>
    </div>

    <!-- Entregados hoy -->
    <div id="seccionEntregados">
      <div class="rep-section-title"><i class="bi bi-check2-circle me-1"></i>Entregados hoy<span class="section-count" id="badgeEntregados"></span></div>
      <div id="listaEntregados"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/repartidor.js?v=3"></script>
</body>
</html>
